<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#060d06"/>
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Keyboard key shape -->
  <rect x="4" y="10" width="24" height="16" rx="3" fill="#0a1a0a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Two cursors racing -->
  <rect x="8" y="14" width="2" height="8" rx="0.5" fill="#22c55e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="22" y="14" width="2" height="8" rx="0.5" fill="#dc2626" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- VS spark -->
  <text x="16" y="21" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#facc15">VS</text>
</svg>
