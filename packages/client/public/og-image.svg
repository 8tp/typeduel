<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040a04"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Scanlines -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="rgba(0,0,0,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Top glow -->
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="8" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="96" font-weight="700" fill="#22c55e" filter="url(#textGlow)">TYPEDUEL</text>

  <!-- Subtitle -->
  <text x="600" y="270" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="28" fill="#e2e8e2" fill-opacity="0.6">Real-time multiplayer typing combat</text>

  <!-- Typing visualization -->
  <!-- Player 1 cursor -->
  <rect x="280" y="330" width="3" height="40" rx="1" fill="#22c55e" filter="url(#subtleGlow)"/>
  <!-- Typed text (green) -->
  <text x="290" y="360" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" fill="#22c55e" fill-opacity="0.8">the quick brown fox</text>
  <!-- Upcoming text (dim) -->
  <text x="748" y="360" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" fill="#e2e8e2" fill-opacity="0.2">jumps over</text>

  <!-- VS divider -->
  <text x="600" y="430" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" font-weight="700" fill="#facc15" fill-opacity="0.8">VS</text>
  <line x1="400" y1="422" x2="565" y2="422" stroke="#facc15" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="635" y1="422" x2="800" y2="422" stroke="#facc15" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Player 2 cursor -->
  <rect x="380" y="450" width="3" height="40" rx="1" fill="#dc2626"/>
  <!-- Typed text (red opponent) -->
  <text x="390" y="480" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" fill="#dc2626" fill-opacity="0.6">the quick bro</text>
  <!-- Upcoming text (dim) -->
  <text x="700" y="480" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" fill="#e2e8e2" fill-opacity="0.2">wn fox jumps</text>

  <!-- Feature pills -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#22c55e" fill-opacity="0.5">
    <rect x="240" y="545" width="120" height="30" rx="15" fill="none" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="300" y="565" text-anchor="middle">6 Abilities</text>

    <rect x="390" y="545" width="100" height="30" rx="15" fill="none" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="440" y="565" text-anchor="middle">Best of 3</text>

    <rect x="520" y="545" width="160" height="30" rx="15" fill="none" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="600" y="565" text-anchor="middle">Practice Mode</text>

    <rect x="710" y="545" width="120" height="30" rx="15" fill="none" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="770" y="565" text-anchor="middle">Spectating</text>

    <rect x="860" y="545" width="100" height="30" rx="15" fill="none" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="910" y="565" text-anchor="middle">Open Src</text>
  </g>
</svg>
